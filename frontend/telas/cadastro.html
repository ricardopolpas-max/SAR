<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAR — Criar conta</title>
  <link rel="stylesheet" href="/frontend/estilos/visual.css" />
</head>
<body>

  <main class="auth-pagina">
    <div class="auth-card">

      <div class="auth-marca">
        <div class="auth-logo">SAR</div>
        <h1 class="auth-titulo">Criar conta</h1>
        <p class="auth-subtitulo">Sistema de Automação de Recolocação</p>
      </div>

      <div id="aviso-global" class="auth-aviso" role="alert"></div>

      <form id="form-cadastro" class="auth-formulario" novalidate>

        <div class="form-grupo" id="grupo-nome">
          <label class="form-label" for="nome">Nome completo</label>
          <input
            class="form-input"
            type="text"
            id="nome"
            name="nome"
            placeholder="Seu nome"
            autocomplete="name"
            required
          />
          <span class="form-mensagem-erro" id="erro-nome"></span>
        </div>

        <div class="form-grupo" id="grupo-email">
          <label class="form-label" for="email">E-mail</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="seu@email.com"
            autocomplete="email"
            required
          />
          <span class="form-mensagem-erro" id="erro-email"></span>
        </div>

        <div class="form-grupo" id="grupo-senha">
          <label class="form-label" for="senha">Senha</label>
          <div class="input-senha-wrapper">
            <input
              class="form-input"
              type="password"
              id="senha"
              name="senha"
              placeholder="Mínimo 6 caracteres"
              autocomplete="new-password"
              required
            />
            <button type="button" class="btn-olho" id="olho-senha" aria-label="Mostrar senha">👁</button>
          </div>
          <span class="form-mensagem-erro" id="erro-senha"></span>
        </div>

        <div class="form-grupo" id="grupo-confirmar-senha">
          <label class="form-label" for="confirmar-senha">Confirmar senha</label>
          <div class="input-senha-wrapper">
            <input
              class="form-input"
              type="password"
              id="confirmar-senha"
              name="confirmar-senha"
              placeholder="Repita a senha"
              autocomplete="new-password"
              required
            />
            <button type="button" class="btn-olho" id="olho-confirmar" aria-label="Mostrar confirmação">👁</button>
          </div>
          <span class="form-mensagem-erro" id="erro-confirmar-senha"></span>
        </div>

        <button type="submit" id="btn-cadastrar" class="btn btn-primario btn-auth">
          Criar conta
        </button>

      </form>

      <p class="auth-rodape">
        Já tem conta? <a href="/login">Entrar</a>
      </p>

    </div>
  </main>

  <script src="/integracao/rotas/api.js"></script>
  <script src="/frontend/scripts/cadastro.js"></script>

</body>
</html>
