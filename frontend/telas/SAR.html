<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAR — Sistema de Automação de Recolocação</title>
  <link rel="stylesheet" href="../estilos/visual.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%232d65e0'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='700' font-size='14' fill='%23e8f0ff'>SAR</text></svg>">
</head>
<body class="app-shell">

  <header class="app-header">
    <span class="app-logo">SAR <span>recolocação</span></span>
    <div class="status-bar">
      <div id="status-dot" class="status-dot"></div>
      <span id="status-texto">verificando...</span>
    </div>
  </header>

  <main class="app-main">

    <p class="secao-label">Vagas</p>

    <div id="lista-vagas" class="lista"></div>

    <div id="estado-vazio" class="estado-vazio hidden">
      <span class="estado-vazio-icone">📭</span>
      <p>Nenhuma vaga cadastrada ainda.</p>
    </div>

    <div id="estado-erro" class="estado-erro hidden">
      <span class="estado-erro-icone">⚠️</span>
      <p id="estado-erro-msg">Não foi possível conectar ao backend.</p>
    </div>

  </main>

  <script src="../../integracao/rotas/api.js"></script>
  <script src="../scripts/vagas.js"></script>

</body>
</html>
