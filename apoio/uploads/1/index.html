<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#495057">
    <link rel="manifest" href="/manifest.json">
    <title>ALMOX 1.0 - Login</title>
    <style>
        :root {
            --btn-active-bg: #2563eb;
            --btn-active-hover-bg: #1d4ed8;
            --btn-active-text: #ffffff;
            --btn-inactive-bg: #cbd5e1;
            --btn-inactive-text: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-container { width: 100%; max-width: 400px; padding: 20px; }
        .login-card { background: white; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); overflow: hidden; }
        .login-header { background: #f8f9fa; padding: 30px; text-align: center; border-bottom: 1px solid #e9ecef; }
        .login-header h1 { color: #495057; font-size: 24px; font-weight: 600; margin-bottom: 5px; }
        .login-header p { color: #868e96; font-size: 14px; }
        .login-body { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #495057; font-weight: 500; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #e9ecef; border-radius: 6px; font-size: 16px; transition: all 0.3s; }
        #login-usuario { text-transform: uppercase; }
        .form-group input:focus { border-color: #667eea; outline: none; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .btn-login { width: 100%; padding: 14px; background: var(--btn-active-bg); color: var(--btn-active-text); border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        .btn-login:hover { background: var(--btn-active-hover-bg); }
        .btn-login:disabled { background: var(--btn-inactive-bg); color: var(--btn-inactive-text); cursor: not-allowed; }
        .mensagem-info { margin-top: 20px; padding: 15px; border-radius: 6px; font-size: 14px; display: none; }
        .mensagem-info.primeiro-acesso { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .mensagem-info.pendencia { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; display: block; }
        .mensagem-info.erro { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
        .credenciais-box { background: #e9ecef; padding: 15px; border-radius: 6px; margin: 15px 0; text-align: center; }
        .credenciais-box .login-display { font-family: monospace; font-size: 18px; font-weight: bold; color: #2c3e50; }
        .credenciais-box .senha-display { font-family: monospace; font-size: 18px; font-weight: bold; color: #e74c3c; }
        .aviso { font-size: 12px; color: #6c757d; margin-top: 10px; font-style: italic; }
        .loading { text-align: center; padding: 20px; color: #6c757d; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>ALMOX 1.0</h1>
                <p>Sistema de Gestão de Almoxarifado</p>
            </div>
            <div class="login-body">
                <!-- Loading inicial -->
                <div id="loading-inicial" class="loading" style="display: block;">
                    <div class="spinner"></div>
                    <p>Verificando ambiente...</p>
                </div>
                <!-- Formulário de login (inicialmente oculto) -->
                <form id="form-login" style="display: none;">
                    <div class="form-group">
                        <label for="login-usuario">Usuário</label>
                        <input type="text" id="login-usuario" placeholder="Digite seu usuário" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="login-senha">Senha</label>
                        <input type="password" id="login-senha" placeholder="Digite sua senha">
                    </div>
                    <button type="submit" class="btn-login" id="btn-entrar">Entrar</button>
                </form>
                <!-- Área de mensagens informativas -->
                <div id="mensagem-container" class="mensagem-info"></div>
                <!-- Área para exibir credenciais (primeiro acesso) -->
                <div id="credenciais-container" style="display: none;">
                    <div class="credenciais-box">
                        <p style="margin-bottom: 10px;">🔐 Credenciais de Acesso</p>
                        <div style="margin-bottom: 10px;">
                            <span style="font-weight: bold;">Login:</span>
                            <span id="credencial-login" class="login-display"></span>
                        </div>
                        <div style="margin-bottom: 10px;">
                            <span style="font-weight: bold;">Senha:</span>
                            <span id="credencial-senha" class="senha-display"></span>
                        </div>
                        <p class="aviso">⚠️ Estas credenciais serão exibidas apenas uma vez</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Rotinas Genéricas e Formatadores -->
    <script src="/js/rotinas.js?v=1.0.1"></script>
    <script src="/js/api.js?v=2.1.1"></script>
    <script src="/js/login.js?v=3.1.2"></script>
</body>
</html>
